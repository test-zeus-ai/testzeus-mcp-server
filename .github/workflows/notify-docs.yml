# Tells test-zeus-ai/testzeus-docs to regenerate + re-host on every push to main,
# so the auto-generated reference stays in sync with this repo.
name: Notify docs

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: test-zeus-ai
          repositories: testzeus-docs
          permission-actions: write

      - name: Trigger docs rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run deploy.yml \
            --repo test-zeus-ai/testzeus-docs \
            --ref main
